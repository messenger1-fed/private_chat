<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audi RS Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #080a0c; color: white; 
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Фон с Audi - фиксированный и четкий */
        #chat { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            background: linear-gradient(rgba(8,10,12,0.85), rgba(8,10,12,0.85)), 
                        url('https://images.unsplash.com/photo-1614162692292-7ac56d7fd761?q=80&w=1080&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }

        header { 
            background: #17212b; padding: 10px 15px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #232e3c; flex-shrink: 0;
        }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2481cc; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Стиль сообщений Телеграм */
        .msg-box { display: flex; flex-direction: column; max-width: 85%; position: relative; margin-bottom: 5px; }
        .my { align-self: flex-end; }
        .fr { align-self: flex-start; }

        .bubble { 
            padding: 8px 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.3); cursor: pointer; position: relative;
        }
        .my .bubble { background: #2b5278; border-bottom-right-radius: 4px; color: white; }
        .fr .bubble { background: #182533; border-bottom-left-radius: 4px; color: #f5f5f5; }

        /* Ответы */
        .reply-quote { 
            background: rgba(0,0,0,0.2); border-left: 2px solid #5288b8; 
            padding: 4px 8px; margin-bottom: 4px; border-radius: 4px; font-size: 13px; color: #add8e6;
        }

        /* Реакции */
        .reac-wrap { display: flex; gap: 3px; margin-top: -6px; padding: 0 8px; z-index: 2; }
        .reac { background: #1c2836; border-radius: 10px; padding: 1px 6px; font-size: 12px; border: 1px solid #2b5278; }

        /* Меню действий (по клику) */
        .msg-actions { 
            display: none; background: #1c2836; border-radius: 12px; padding: 8px; 
            gap: 12px; position: absolute; top: -45px; right: 0; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #2b5278;
        }
        .active .msg-actions { display: flex; }

        /* Поле ввода */
        .input-wrap { background: #17212b; padding: 10px; flex-shrink: 0; }
        #reply-preview { 
            display: none; background: #17212b; padding: 8px 15px; border-left: 3px solid #2481cc;
            justify-content: space-between; align-items: center; border-bottom: 1px solid #000;
        }
        .input-row { display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 5px; }
        .send-btn { color: #2481cc; font-weight: bold; cursor: pointer; border: none; background: none; font-size: 16px; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<header>
    <div class="avatar">RS</div>
    <div>
        <div style="font-weight: 600;">FZ & AL Premium</div>
        <div style="font-size: 12px; color: #708499;">online</div>
    </div>
</header>

<div id="chat" onclick="closeMenus()"></div>

<div class="input-wrap">
    <div id="reply-preview">
        <div id="reply-info" style="font-size: 13px; color: #2481cc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></div>
        <div onclick="cancelReply()" style="color: #708499; cursor: pointer; padding-left: 10px;">✕</div>
    </div>
    <div class="input-row">
        <input type="text" id="msgInput" placeholder="Сообщение" autocomplete="off">
        <button class="send-btn" onclick="send()">Отправить</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCIy6k3p5Fy-rlqR4N_wkcFFiHozyodT3I",
        authDomain: "fzandalchat.firebaseapp.com",
        projectId: "fzandalchat",
        storageBucket: "fzandalchat.firebasestorage.app",
        messagingSenderId: "863962788461",
        appId: "1:863962788461:web:07adea356754a7a2390564",
        databaseURL: "https://fzandalchat-default-rtdb.europe-west1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const chatRef = db.ref("messages");

    const myId = localStorage.getItem('chatUserId') || 'u' + Date.now();
    localStorage.setItem('chatUserId', myId);
    let activeReplyId = null;

    // СЛУШАЕМ БАЗУ (Вернул старые названия полей text и sender)
    chatRef.on("value", (snap) => {
        const chat = document.getElementById('chat');
        chat.innerHTML = '';
        const allMsgs = [];
        snap.forEach(s => allMsgs.push({id: s.key, ...s.val()}));
        allMsgs.forEach(m => render(m, allMsgs));
        chat.scrollTop = chat.scrollHeight;
    });

    function send() {
        const inp = document.getElementById('msgInput');
        if (!inp.value.trim()) return;
        chatRef.push({
            sender: myId,
            text: inp.value,
            replyTo: activeReplyId,
            reactions: {}
        });
        inp.value = "";
        cancelReply();
    }

    function render(m, all) {
        const isMy = m.sender === myId;
        const div = document.createElement('div');
        div.className = `msg-box ${isMy ? 'my' : 'fr'}`;
        div.id = 'box-' + m.id;

        // Рендер ответа
        let replyHtml = '';
        if(m.replyTo) {
            const parent = all.find(x => x.id === m.replyTo);
            replyHtml = `<div class="reply-quote">${parent ? parent.text : 'Сообщение удалено'}</div>`;
        }

        // Рендер реакций
        let reacsHtml = '<div class="reac-wrap">';
        if(m.reactions) Object.values(m.reactions).forEach(r => reacsHtml += `<span class="reac">${r}</span>`);
        reacsHtml += '</div>';

        div.innerHTML = `
            <div class="msg-actions">
                <span onclick="addReac('${m.id}', '❤️')">❤️</span>
                <span onclick="addReac('${m.id}', '🔥')">🔥</span>
                <span onclick="addReac('${m.id}', '👍')">👍</span>
                <span onclick="setReply('${m.id}', '${m.text}')">↩️</span>
                ${isMy ? `<span onclick="db.ref('messages/${m.id}').remove()">🗑️</span>` : ''}
            </div>
            <div class="bubble" onclick="toggleMenu(event, '${m.id}')">
                ${replyHtml} ${m.text}
            </div>
            ${reacsHtml}
        `;
        document.getElementById('chat').appendChild(div);
    }

    function toggleMenu(e, id) {
        e.stopPropagation();
        const box = document.getElementById('box-' + id);
        const isOpen = box.classList.contains('active');
        closeMenus();
        if(!isOpen) box.classList.add('active');
    }

    function closeMenus() {
        document.querySelectorAll('.msg-box').forEach(b => b.classList.remove('active'));
    }

    function setReply(id, txt) {
        activeReplyId = id;
        document.getElementById('reply-info').innerText = txt;
        document.getElementById('reply-preview').style.display = 'flex';
        closeMenus();
    }

    function cancelReply() {
        activeReplyId = null;
        document.getElementById('reply-preview').style.display = 'none';
    }

    function addReac(id, emo) {
        db.ref(`messages/${id}/reactions/${myId}`).set(emo);
        closeMenus();
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key==='Enter') send(); });
</script>
</body>
</html>
