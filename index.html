<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audi Premium Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --tg-bg: #0e1621; --tg-header: #17212b; --tg-my-msg: #2b5278;
            --tg-fr-msg: #182533; --tg-accent: #2481cc; --tg-text: #f5f5f5;
        }
        
        /* Исправляем прокрутку и выделение */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, sans-serif; 
            background: var(--tg-bg); color: var(--tg-text);
            -webkit-tap-highlight-color: transparent; /* Убираем синий квадрат при нажатии */
        }

        #app-container { display: flex; flex-direction: column; height: 100vh; }

        header { 
            background: var(--tg-header); padding: 10px 20px; display: flex; align-items: center; gap: 15px; 
            z-index: 10; flex-shrink: 0;
        }

        /* Чат теперь КОРРЕКТНО листается */
        #chat { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; 
            background: url('https://images.unsplash.com/photo-1614162692292-7ac56d7fd761?q=80&w=1080&auto=format&fit=crop') center/cover fixed;
            position: relative;
            -webkit-overflow-scrolling: touch; /* Плавный скролл на iPhone */
        }
        #chat::before { content: ""; position: fixed; inset: 0; background: rgba(14, 22, 33, 0.8); z-index: 0; }

        .msg-wrapper { display: flex; flex-direction: column; position: relative; z-index: 1; user-select: none; }
        .msg { 
            padding: 8px 14px; border-radius: 14px; max-width: 85%; font-size: 0.95rem; 
            line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); 
            cursor: pointer; pointer-events: auto;
        }
        .my-wrapper { align-items: flex-end; }
        .my { background: var(--tg-my-msg); border-bottom-right-radius: 4px; }
        .fr-wrapper { align-items: flex-start; }
        .fr { background: var(--tg-fr-msg); border-bottom-left-radius: 4px; }

        /* Панель инструментов: теперь по клику */
        .controls { 
            display: none; position: absolute; top: -45px; background: #1c2836; 
            border-radius: 12px; padding: 8px; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); z-index: 100; 
        }
        .show-controls .controls { display: flex; }

        .ctrl-btn { cursor: pointer; font-size: 1.2rem; }
        .reply-box { background: rgba(0,0,0,0.2); border-left: 2px solid #fff; padding: 2px 8px; margin-bottom: 4px; border-radius: 3px; font-size: 0.85rem; color: #81b3e0; }

        .reactions { display: flex; gap: 4px; margin-top: -8px; z-index: 2; padding: 0 5px; }
        .reac-item { background: #1c2836; border-radius: 10px; padding: 1px 5px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }

        .input-container { background: var(--tg-header); z-index: 10; flex-shrink: 0; }
        .input-area { padding: 10px 15px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .send-btn { color: var(--tg-accent); font-weight: bold; cursor: pointer; border: none; background: none; font-size: 1rem; }
        
        #reply-preview { display: none; background: rgba(23, 33, 43, 0.95); padding: 5px 20px; border-left: 3px solid var(--tg-accent); justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #2481cc; display: flex; align-items: center; justify-content: center; font-weight: bold;">A</div>
        <div style="flex:1">
            <div style="font-weight: 600;">Audi Premium</div>
            <div style="font-size: 0.75rem; color: #708499;">online</div>
        </div>
    </header>

    <div id="chat" onclick="closeAllControls()"></div>

    <div class="input-container">
        <div id="reply-preview">
            <div id="reply-text" style="font-size: 0.8rem; color: var(--tg-accent);"></div>
            <div onclick="cancelReply()" style="color: #708499; padding: 5px;">✕</div>
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение" autocomplete="off">
            <button class="send-btn" onclick="send()">Отпр.</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCIy6k3p5Fy-rlqR4N_wkcFFiHozyodT3I",
        authDomain: "fzandalchat.firebaseapp.com",
        projectId: "fzandalchat",
        storageBucket: "fzandalchat.firebasestorage.app",
        messagingSenderId: "863962788461",
        appId: "1:863962788461:web:07adea356754a7a2390564",
        databaseURL: "https://fzandalchat-default-rtdb.europe-west1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const chatRef = db.ref("messages");

    let currentReplyId = null;
    const myId = localStorage.getItem('chatUserId') || 'u' + Date.now();
    localStorage.setItem('chatUserId', myId);

    chatRef.on("value", (snapshot) => {
        const container = document.getElementById('chat');
        container.innerHTML = '';
        const msgs = [];
        snapshot.forEach(c => msgs.push({id: c.key, ...c.val()}));
        msgs.forEach(m => renderMsg(m, msgs));
        container.scrollTop = container.scrollHeight;
    });

    function send() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim()) return;
        chatRef.push({
            sender: myId,
            text: input.value,
            timestamp: Date.now(),
            replyTo: currentReplyId,
            reactions: {}
        });
        input.value = "";
        cancelReply();
    }

    function toggleControls(e, id) {
        e.stopPropagation();
        const wrapper = document.getElementById('wrap-' + id);
        const isOpen = wrapper.classList.contains('show-controls');
        closeAllControls();
        if (!isOpen) wrapper.classList.add('show-controls');
    }

    function closeAllControls() {
        document.querySelectorAll('.msg-wrapper').forEach(el => el.classList.remove('show-controls'));
    }

    function setReply(id, text) {
        currentReplyId = id;
        document.getElementById('reply-text').innerText = text;
        document.getElementById('reply-preview').style.display = 'flex';
        closeAllControls();
    }

    function cancelReply() {
        currentReplyId = null;
        document.getElementById('reply-preview').style.display = 'none';
    }

    function react(id, emoji) {
        db.ref("messages/" + id + "/reactions/" + myId).set(emoji);
        closeAllControls();
    }

    function renderMsg(data, allMsgs) {
        const isMy = data.sender === myId;
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${isMy ? 'my-wrapper' : 'fr-wrapper'}`;
        wrapper.id = 'wrap-' + data.id;

        let replyHtml = '';
        if(data.replyTo) {
            const p = allMsgs.find(m => m.id === data.replyTo);
            replyHtml = `<div class="reply-box">${p ? p.text : 'Удалено'}</div>`;
        }

        let reactionsHtml = '<div class="reactions">';
        if(data.reactions) {
            Object.values(data.reactions).forEach(e => { reactionsHtml += `<span class="reac-item">${e}</span>`; });
        }
        reactionsHtml += '</div>';

        wrapper.innerHTML = `
            <div class="controls">
                <span class="ctrl-btn" onclick="react('${data.id}', '👍')">👍</span>
                <span class="ctrl-btn" onclick="react('${data.id}', '❤️')">❤️</span>
                <span class="ctrl-btn" onclick="react('${data.id}', '🔥')">🔥</span>
                <span class="ctrl-btn" onclick="setReply('${data.id}', '${data.text}')">↩️</span>
                ${isMy ? `<span class="ctrl-btn" onclick="db.ref('messages/${data.id}').remove()">🗑️</span>` : ''}
            </div>
            <div class="msg ${isMy ? 'my' : 'fr'}" onclick="toggleControls(event, '${data.id}')">
                ${replyHtml}
                ${data.text}
            </div>
            ${reactionsHtml}
        `;
        document.getElementById('chat').appendChild(wrapper);
    }

    document.getElementById('msgInput').addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
</script>
</body>
</html>
