<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Private Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 10px; background: var(--panel); text-align: center; font-size: 0.8rem; border-bottom: 1px solid #334155; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m { max-width: 85%; padding: 10px; border-radius: 12px; font-size: 0.9rem; word-break: break-word; }
        .my { align-self: flex-end; background: #0369a1; }
        .fr { align-self: flex-start; background: #334155; }
        .sys { align-self: center; background: none; color: #64748b; font-size: 0.7rem; }
        .input-box { padding: 15px; background: var(--panel); display: flex; gap: 8px; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: white; outline: none; }
        button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

<div id="overlay">
    <h3>🔐 Вход в чат</h3>
    <p style="font-size: 0.8rem; color: #94a3b8;">Ваш ID (нажми скопировать):<br>
    <b id="m-id" onclick="copyId()" style="color:var(--accent); cursor:pointer; font-size: 1.1rem;">Загрузка...</b></p>
    <input type="password" id="pass" placeholder="Общий пароль">
    <input type="text" id="target-id" placeholder="ID друга">
    <button onclick="start()" style="width: 100%; margin-top: 15px;">Установить связь</button>
</div>

<header id="status">PeerJS инициализация...</header>
<div id="chat"></div>
<div class="input-box">
    <input type="text" id="msg" placeholder="Введите сообщение...">
    <button onclick="send()">ОТПР.</button>
</div>

<script>
    // Настройки для обхода блокировок роутеров (STUN-серверы Google)
    const config = {
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }] }
    };
    
    let peer = new Peer(config), conn, password;

    peer.on('open', id => {
        document.getElementById('m-id').innerText = id;
        document.getElementById('status').innerText = "Ваш ID готов. Ждем действий.";
    });

    peer.on('error', err => {
        addMsg("Ошибка системы: " + err.type, 'sys');
    });

    // Когда кто-то стучится к нам
    peer.on('connection', c => {
        password = document.getElementById('pass').value;
        if(!password) {
            alert("Кто-то подключается! Срочно введите пароль и нажмите 'Установить связь', иначе сообщения не расшифруются.");
            return;
        }
        conn = c;
        bindEvents();
    });

    function start() {
        password = document.getElementById('pass').value;
        const target = document.getElementById('target-id').value;
        
        if(!password) return alert("Без пароля шифрование не сработает!");
        
        if(target) {
            addMsg("Пытаюсь подключиться к " + target, 'sys');
            conn = peer.connect(target, { reliable: true });
            bindEvents();
        } else {
            document.getElementById('overlay').style.display = 'none';
            addMsg("Режим ожидания. Передай свой ID другу.", 'sys');
        }
    }

    function bindEvents() {
        conn.on('open', () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').innerText = "СВЯЗЬ УСТАНОВЛЕНА";
            addMsg("Канал связи открыт!", 'sys');
        });

        conn.on('data', data => {
            try {
                const bytes = CryptoJS.AES.decrypt(data, password);
                const text = bytes.toString(CryptoJS.enc.Utf8);
                if(text) {
                    addMsg(text, 'fr');
                } else {
                    addMsg("Получено зашифрованное сообщение (неверный пароль)", 'sys');
                }
            } catch(e) {
                addMsg("Ошибка дешифровки", 'sys');
            }
        });

        conn.on('close', () => {
            addMsg("Связь разорвана", 'sys');
            document.getElementById('status').innerText = "Разъединено";
        });
    }

    function send() {
        const input = document.getElementById('msg');
        if(input.value && conn && conn.open) {
            const crypted = CryptoJS.AES.encrypt(input.value, password).toString();
            conn.send(crypted);
            addMsg(input.value, 'my');
            input.value = '';
        } else if (!conn || !conn.open) {
            addMsg("Ошибка: Соединение не активно", 'sys');
        }
    }

    function addMsg(t, cl) {
        const d = document.createElement('div');
        d.className = `m ${cl}`;
        d.innerText = t;
        document.getElementById('chat').appendChild(d);
        document.getElementById('chat').scrollTop = 99999;
    }

    function copyId() {
        const idText = document.getElementById('m-id').innerText;
        navigator.clipboard.writeText(idText).then(() => alert("ID скопирован"));
    }
</script>
</body>
</html>
