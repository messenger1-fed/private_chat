<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private P2P Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js">let peer = new Peer(), conn, password;

    peer.on('open', id => {
        document.getElementById('m-id').innerText = id;
        console.log("Мой ID:", id);
    });

    // Слушаем входящее подключение
    peer.on('connection', c => {
        conn = c;
        password = document.getElementById('pass').value;
        if(!password) alert("Внимание: входящее соединение! Введите пароль, чтобы видеть текст.");
        
        // Ждем, пока канал данных будет готов
        conn.on('open', () => {
            setup();
        });
    });

    function start() {
        password = document.getElementById('pass').value;
        const target = document.getElementById('target-id').value;
        
        if(!password) return alert("Введите пароль для шифрования!");
        if(!target) return alert("Введите ID друга!");

        conn = peer.connect(target);
        
        // КРИТИЧНО: ждем открытия, прежде чем прятать экран
        conn.on('open', () => {
            setup();
        });

        // Если возникла ошибка при подключении
        conn.on('error', err => {
            alert("Ошибка связи: " + err);
        });
    }

    function setup() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('status').innerText = "Защищенный чат активен";
        
        // Слушаем данные
        conn.on('data', data => {
            console.log("Получены зашифрованные данные:", data);
            try {
                const bytes = CryptoJS.AES.decrypt(data, password);
                const text = bytes.toString(CryptoJS.enc.Utf8);
                
                if(text) {
                    addMsg(text, 'fr');
                } else {
                    addMsg("Ошибка: неверный пароль или пустые данные", 'fr');
                }
            } catch(e) {
                addMsg("Критическая ошибка расшифровки", 'fr');
            }
        });
    }

    function send() {
        const val = document.getElementById('msg').value;
        if(val && conn && conn.open) {
            const crypted = CryptoJS.AES.encrypt(val, password).toString();
            conn.send(crypted);
            addMsg(val, 'my');
            document.getElementById('msg').value = '';
        } else {
            alert("Соединение еще не установлено или разорвано");
        }
    }

    function addMsg(t, cl) {
        const d = document.createElement('div');
        d.className = `m ${cl}`;
        d.innerText = t;
        document.getElementById('chat').appendChild(d);
        document.getElementById('chat').scrollTop = 99999;
    }

    function copyId() {
        navigator.clipboard.writeText(document.getElementById('m-id').innerText);
        alert("ID скопирован");
    }</script>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #38bdf8;
            --my-msg: #0369a1;
            --friend-msg: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Шапка */
        header {
            padding: 15px;
            background: var(--chat-bg);
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        #my-id-display {
            font-size: 0.8rem;
            color: var(--accent);
            word-break: break-all;
            cursor: pointer;
        }

        /* Зона чата */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .my { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .friend { align-self: flex-start; background: var(--friend-msg); border-bottom-left-radius: 4px; }

        /* Панель ввода */
        .input-area {
            padding: 15px;
            background: var(--chat-bg);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        button {
            background: var(--accent);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }

        /* Окно подключения */
        #setup-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <h2>Личный чат</h2>
        <p>Ваш ID (нажмите, чтобы скопировать):</p>
        <div id="my-id-display" onclick="copyId()">Загрузка...</div>
        <br>
        <input type="text" id="peer-id-input" placeholder="Вставьте ID друга">
        <br>
        <button onclick="connectToFriend()">Соединиться</button>
    </div>

    <header>
        <div id="status">Ожидание подключения...</div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Сообщение...">
        <button onclick="sendMsg()">></button>
    </div>

    <script>
        let peer = new Peer(); 
        let conn;

        // 1. Генерируем твой ID
        peer.on('open', (id) => {
            document.getElementById('my-id-display').innerText = id;
        });

        // 2. Слушаем входящие
        peer.on('connection', (c) => {
            conn = c;
            initChat();
        });

        // 3. Подключаемся к другу
        function connectToFriend() {
            const friendId = document.getElementById('peer-id-input').value;
            if (friendId) {
                conn = peer.connect(friendId);
                initChat();
            }
        }

        function initChat() {
            document.getElementById('setup-overlay').style.display = 'none';
            document.getElementById('status').innerText = "На связи";
            
            conn.on('data', (data) => {
                addMessage(data, 'friend');
            });

            conn.on('close', () => {
                alert("Связь потеряна");
                location.reload();
            });
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if (input.value && conn) {
                conn.send(input.value);
                addMessage(input.value, 'my');
                input.value = '';
            }
        }

        function addMessage(text, type) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function copyId() {
            const idText = document.getElementById('my-id-display').innerText;
            navigator.clipboard.writeText(idText);
            alert("ID скопирован! Отправь его другу.");
        }
    </script>
</body>
</html>
