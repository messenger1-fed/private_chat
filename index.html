<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FZ&AL Private Chat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --chat: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: var(--chat); text-align: center; border-bottom: 1px solid #334155; font-weight: bold; color: var(--accent); }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .my { align-self: flex-end; background: #0369a1; border-bottom-right-radius: 4px; }
        .fr { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
        .input-area { padding: 15px; background: var(--chat); display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 12px; border-radius: 10px; color: white; outline: none; }
        button { background: var(--accent); border: none; padding: 0 20px; border-radius: 10px; color: #0f172a; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>FZ & AL SECRET CHAT</header>
<div id="chat"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">></button>
</div>

<script>
    // Твоя конфигурация Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCIy6k3p5Fy-rlqR4N_wkcFFiHozyodT3I",
        authDomain: "fzandalchat.firebaseapp.com",
        projectId: "fzandalchat",
        storageBucket: "fzandalchat.firebasestorage.app",
        messagingSenderId: "863962788461",
        appId: "1:863962788461:web:07adea356754a7a2390564",
        databaseURL: "https://fzandalchat-default-rtdb.europe-west1.firebasedatabase.app" // Стандартный URL для базы
    };

    // Инициализация
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const chatRef = db.ref("messages");

    // Твой уникальный ID для этого устройства (чтобы чат понимал, где "я", а где "друг")
    const myId = localStorage.getItem('chatUserId') || 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('chatUserId', myId);

    // Загрузка сообщений
    chatRef.limitToLast(100).on("child_added", (snapshot) => {
        const data = snapshot.val();
        renderMsg(data.text, data.sender === myId ? 'my' : 'fr');
    });

    function send() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (text) {
            chatRef.push({
                sender: myId,
                text: text,
                timestamp: Date.now()
            });
            input.value = "";
        }
    }

    function renderMsg(text, type) {
        const container = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
